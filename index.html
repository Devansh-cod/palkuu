<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>a little moment</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Nunito:wght@300;400;500&family=Caveat:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blush:    #fde8f0;
    --petal:    #f9cfe4;
    --peach:    #fce4d6;
    --cream:    #fdf8f2;
    --lavender: #ede8fc;
    --lilac:    #f5e6f8;
    --rose:     #e8a0bc;
    --mauve:    #b5738a;
    --violet:   #a37bc4;
    --text:     #6b4c5e;
    --text-mid: #9b7189;
    --text-dim: #c4a0b5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(145deg, #fde8f0 0%, #f5e6f8 35%, #ede8fc 65%, #fce4d6 100%);
    font-family: 'Nunito', sans-serif;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }

  /* ── FLOATING PETALS ── */
  .petal-layer { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .fp {
    position: absolute;
    font-size: 16px;
    opacity: 0;
    animation: floatPetal linear infinite;
  }
  @keyframes floatPetal {
    0%   { transform: translateY(0) rotate(0deg)   scale(1);   opacity: 0; }
    8%   { opacity: 0.22; }
    92%  { opacity: 0.15; }
    100% { transform: translateY(-105vh) rotate(40deg) scale(0.8); opacity: 0; }
  }

  /* ── SOFT BLOBS ── */
  .blob {
    position: fixed; border-radius: 50%;
    filter: blur(72px); pointer-events: none; z-index: 0;
    animation: blobPulse ease-in-out infinite;
  }
  @keyframes blobPulse {
    0%,100% { transform: scale(1) translate(0,0); opacity: 0.55; }
    50%      { transform: scale(1.08) translate(8px,-8px); opacity: 0.7; }
  }

  /* ── CARD ── */
  .card {
    position: relative; z-index: 10;
    text-align: center;
    display: flex; flex-direction: column; align-items: center;
    gap: 0;
    padding: 0 20px;
    animation: fadeUp 1.4s ease forwards;
    opacity: 0;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* greeting */
  .greeting {
    font-family: 'Caveat', cursive;
    font-size: 20px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    margin-bottom: 28px;
    animation: fadeUp 1.4s ease 0.2s both;
  }

  /* time */
  .time-wrap {
    display: flex; align-items: baseline; gap: 6px;
    animation: fadeUp 1.4s ease 0.4s both;
    margin-bottom: 10px;
  }

  .time-main {
    font-family: 'Playfair Display', serif;
    font-size: clamp(80px, 16vw, 148px);
    font-weight: 400;
    color: var(--text);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .time-main .colon {
    animation: blinkColon 1s step-end infinite;
    display: inline-block; margin: 0 2px;
  }
  @keyframes blinkColon {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.2; }
  }

  .time-seconds {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 400; font-style: italic;
    color: var(--text-dim);
    line-height: 1;
    margin-bottom: 6px;
  }

  .ampm {
    font-family: 'Nunito', sans-serif;
    font-size: clamp(14px, 2.5vw, 20px);
    font-weight: 300;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
    align-self: flex-end;
    padding-bottom: 12px;
  }

  /* divider */
  .divider {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--rose), transparent);
    margin: 24px auto;
    animation: fadeUp 1.4s ease 0.6s both;
  }

  /* date */
  .date-wrap {
    animation: fadeUp 1.4s ease 0.8s both;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }

  .day-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 42px);
    font-style: italic;
    color: var(--text);
    font-weight: 400;
    letter-spacing: 0.03em;
  }

  .full-date {
    font-family: 'Nunito', sans-serif;
    font-size: 15px; font-weight: 300;
    letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--text-mid);
  }

  /* bottom note */
  .bottom-note {
    margin-top: 52px;
    font-family: 'Caveat', cursive;
    font-size: 17px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    animation: fadeUp 1.4s ease 1.2s both;
  }

  /* little hearts row */
  .hearts-row {
    margin-top: 18px;
    display: flex; gap: 10px; align-items: center;
    animation: fadeUp 1.4s ease 1.5s both;
  }
  .h-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--petal);
    animation: hDotPulse ease-in-out infinite;
  }
  .h-dot:nth-child(1) { animation-delay: 0s;    background: var(--petal); }
  .h-dot:nth-child(2) { animation-delay: 0.3s;  background: var(--rose);  width:9px;height:9px; }
  .h-dot:nth-child(3) { animation-delay: 0.6s;  background: var(--lavender); }
  .h-dot:nth-child(4) { animation-delay: 0.9s;  background: var(--peach); }
  .h-dot:nth-child(5) { animation-delay: 1.2s;  background: var(--petal); }

  @keyframes hDotPulse {
    0%,100% { transform: scale(1);   opacity: 0.6; }
    50%      { transform: scale(1.5); opacity: 1;   }
  }

  /* season pill */
  .season-pill {
    margin-top: 32px;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 22px; border-radius: 99px;
    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(232,160,188,0.35);
    backdrop-filter: blur(8px);
    font-family: 'Caveat', cursive;
    font-size: 16px; color: var(--mauve);
    letter-spacing: 0.05em;
    animation: fadeUp 1.4s ease 1.8s both;
    box-shadow: 0 4px 20px rgba(181,115,138,0.1);
  }
  .season-dot { font-size: 14px; }
</style>
</head>
<body>

<!-- Blobs -->
<div class="blob" style="width:420px;height:420px;background:#fde8f0;top:-80px;left:-80px;animation-duration:7s;"></div>
<div class="blob" style="width:360px;height:360px;background:#ede8fc;bottom:-60px;right:-60px;animation-duration:9s;animation-delay:2s;"></div>
<div class="blob" style="width:280px;height:280px;background:#fce4d6;bottom:20%;left:5%;animation-duration:11s;animation-delay:4s;"></div>
<div class="blob" style="width:200px;height:200px;background:#f9cfe4;top:15%;right:8%;animation-duration:8s;animation-delay:1s;"></div>

<!-- Floating petals -->
<div class="petal-layer" id="petals"></div>

<!-- Card -->
<div class="card">
  <div class="greeting" id="greeting">good morning :)</div>

  <div class="time-wrap">
    <div class="ampm" id="ampm">AM</div>
    <div class="time-main">
      <span id="hh">--</span><span class="colon">:</span><span id="mm">--</span>
    </div>
    <div class="time-seconds" id="ss">00</div>
  </div>

  <div class="divider"></div>

  <div class="date-wrap">
    <div class="day-name" id="dayname">---</div>
    <div class="full-date" id="fulldate">--- · -- · ----</div>
  </div>

  <div class="hearts-row">
    <div class="h-dot"></div>
    <div class="h-dot"></div>
    <div class="h-dot"></div>
    <div class="h-dot"></div>
    <div class="h-dot"></div>
  </div>

  <div class="bottom-note" id="bottom-note">take it slow today 🌸</div>

  <div class="season-pill">
    <span class="season-dot" id="season-emoji">🌸</span>
    <span id="season-text">spring</span>
  </div>
</div>

<script>
  // ── PETALS ──
  const petalLayer = document.getElementById('petals');
  const symbols = ['✿','❀','✦','·','˚','♡','⁺'];
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'fp';
    const dur  = 14 + Math.random() * 18;
    const delay = Math.random() * 20;
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      bottom: ${-5 + Math.random() * 20}%;
      font-size: ${12 + Math.random() * 14}px;
      animation-duration: ${dur}s;
      animation-delay: ${delay}s;
      color: #e8a0bc;
    `;
    p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    petalLayer.appendChild(p);
  }

  // ── CLOCK ──
  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  const greetings = {
    night:     'burning midnight oil? 🌙',
    morning:   'good morning :)',
    afternoon: 'good afternoon 🌤',
    evening:   'good evening 🌷',
  };

  const notes = {
    night:     'rest when you can 🌙',
    morning:   'take it slow today 🌸',
    afternoon: 'hope today\'s been kind 🌼',
    evening:   'you did well today 🌷',
  };

  const seasons = {
    spring: { emoji: '🌸', text: 'spring' },
    summer: { emoji: '☀️', text: 'summer' },
    autumn: { emoji: '🍂', text: 'autumn' },
    winter: { emoji: '❄️', text: 'winter' },
  };

  function getSeason(m) {
    if (m >= 2 && m <= 4) return 'spring';
    if (m >= 5 && m <= 7) return 'summer';
    if (m >= 8 && m <= 10) return 'autumn';
    return 'winter';
  }

  function getTimeOfDay(h) {
    if (h >= 0  && h < 6)  return 'night';
    if (h >= 6  && h < 12) return 'morning';
    if (h >= 12 && h < 17) return 'afternoon';
    return 'evening';
  }

  let lastTod = null;

  function tick() {
    const now = new Date();
    let h = now.getHours();
    const m = now.getMinutes();
    const s = now.getSeconds();
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 || 12;

    document.getElementById('hh').textContent   = String(h12).padStart(2, '0');
    document.getElementById('mm').textContent   = String(m).padStart(2, '0');
    document.getElementById('ss').textContent   = String(s).padStart(2, '0');
    document.getElementById('ampm').textContent = ampm;

    // date
    document.getElementById('dayname').textContent  = days[now.getDay()];
    document.getElementById('fulldate').textContent =
      months[now.getMonth()] + ' · ' +
      String(now.getDate()).padStart(2,'0') + ' · ' +
      now.getFullYear();

    // time of day
    const tod = getTimeOfDay(h);
    if (tod !== lastTod) {
      lastTod = tod;
      document.getElementById('greeting').textContent    = greetings[tod];
      document.getElementById('bottom-note').textContent = notes[tod];
    }

    // season
    const season = getSeason(now.getMonth());
    document.getElementById('season-emoji').textContent = seasons[season].emoji;
    document.getElementById('season-text').textContent  = seasons[season].text;
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
